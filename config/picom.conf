## ----- Shadows ----- ##
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#000000"

## ----- Fading ----- ##
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5

## ----- Glassmorphism Settings ----- ##
inactive-opacity = 0.85;
frame-opacity = 0.7;
active-opacity = 0.92;

## ----- Corners ----- ##
corner-radius = 6

#################################
#           Settings            #
#################################

backend = "glx"
vsync = true;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

#################################
#             Blur              #
#################################

blur:
{
    method = "dual_kawase";
    strength = 7;
    background = true;
    background-frame = false;
    background-fixed = false;
}

#################################
#             Rules             #
#################################

rules: (
    {
        blur-background = true;
        fade = true;
    },

    # --- REGLA MAESTRA PARA FULLSCREEN ---
    # Al entrar en pantalla completa, se elimina toda transparencia y blur.
    {
        match = "fullscreen";
        opacity = 1.0;
        blur-background = false;
        corner-radius = 0;
        shadow = false;
    },

    # --- REGLA PARA VIDEO Y MULTIMEDIA (Incluyendo MUBI) ---
    # Forzamos opacidad 1.0 y desactivamos blur para estas apps o títulos
    {
        match = "class_g = 'mpv' || "
                "class_g = 'vlc' || "
                "class_g = 'retroarch' || "
                "class_g = 'mubi' || "      # Clase de app nativa/PWA
                "name *?= 'MUBI' || "       # Título en el navegador
                "name *?= 'Netflix' || "
                "name *?= 'YouTube'";
        opacity = 1.0;
        blur-background = false;
    },

    {
        match = "window_type = 'tooltip'";
        corner-radius = 0;
        opacity = 0.85;
    },

    {
        match = "class_g = 'Alacritty' || class_g = 'st-256color' || class_g = 'kitty'";
        opacity = 0.85;
        blur-background = true;
    },

    {
        match = "class_g = 'Polybar' || class_g = 'Rofi' || class_g = 'Dunst' || class_g = 'Eww'";
        opacity = 0.9;
        blur-background = true;
    },

@include "picom-animations.conf"
)
